name: 每日基金分析

on:
  # 定时触发 - 中国交易日北京时间 18:00（UTC 10:00）
  schedule:
    - cron: '0 10 * * 1-5'   # 周一到周五 UTC 10:00 = 北京时间 18:00（节假日是否执行由交易日检查决定）

  # 手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full        # 完整分析（获取数据 + AI 分析 + 推送）
          - dry-run     # 仅获取数据，不 AI 分析，不推送
          - no-notify   # 分析但不推送

# 并发控制：同一时间只运行一个分析任务
concurrency:
  group: fund-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 检查中国大陆交易日
        id: trading_day_check
        run: |
          python - <<'PY'
          import os
          from datetime import datetime, timezone, timedelta
          from chinese_calendar import is_workday

          today_cn = datetime.now(timezone(timedelta(hours=8))).date()
          is_cn_trading_day = today_cn.weekday() < 5 and is_workday(today_cn)
          print(f"北京时间日期: {today_cn} | 中国交易日: {is_cn_trading_day}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"is_trading_day={'true' if is_cn_trading_day else 'false'}\n")
              f.write(f"today_cn={today_cn}\n")
          PY

      - name: 非交易日跳过
        if: github.event_name == 'schedule' && steps.trading_day_check.outputs.is_trading_day != 'true'
        run: |
          echo "北京时间 ${{ steps.trading_day_check.outputs.today_cn }} 不是中国大陆交易日，跳过本次分析。"

      - name: 创建必要目录
        if: github.event_name != 'schedule' || steps.trading_day_check.outputs.is_trading_day == 'true'
        run: mkdir -p logs reports data

      - name: 执行基金分析
        if: github.event_name != 'schedule' || steps.trading_day_check.outputs.is_trading_day == 'true'
        env:
          # ==========================================
          # 自选基金列表（逗号分隔，天天基金代码）
          # ==========================================
          FUND_LIST: ${{ vars.FUND_LIST || secrets.FUND_LIST || '110022,003095,100032' }}
          REPORT_DAYS: ${{ vars.REPORT_DAYS || '30' }}
          REPORT_TYPE: ${{ vars.REPORT_TYPE || 'full' }}
          REPORT_SUMMARY_ONLY: ${{ vars.REPORT_SUMMARY_ONLY || 'false' }}
          CN_WORKDAY_ONLY: ${{ vars.CN_WORKDAY_ONLY || 'true' }}

          # ==========================================
          # AI 配置（二选一）
          # ==========================================
          # Gemini（推荐，免费额度充足）
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.0-flash' }}
          GEMINI_TEMPERATURE: ${{ vars.GEMINI_TEMPERATURE || '0.7' }}

          # OpenAI 兼容 API（DeepSeek/通义千问 等）
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL }}

          # ==========================================
          # 通知渠道（可同时配置多个）
          # ==========================================

          # 方式一：Telegram Bot（推荐）
          # 1. @BotFather -> /newbot -> 获取 Bot Token
          # 2. @userinfobot 获取 Chat ID
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # 方式二：邮件推送（SMTP）
          # 支持 QQ邮箱、163邮箱、Gmail、Outlook
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
          EMAIL_SENDER_NAME: ${{ vars.EMAIL_SENDER_NAME || '基金每日分析助手' }}

          # ==========================================
          # 系统配置
          # ==========================================
          LOG_LEVEL: INFO
          MAX_WORKERS: ${{ vars.MAX_WORKERS || '3' }}
          DATA_SOURCE_CONNECT_TIMEOUT: ${{ vars.DATA_SOURCE_CONNECT_TIMEOUT || '3.0' }}
          DATA_SOURCE_READ_TIMEOUT: ${{ vars.DATA_SOURCE_READ_TIMEOUT || '8.0' }}
          DATA_SOURCE_MAX_RETRIES: ${{ vars.DATA_SOURCE_MAX_RETRIES || '0' }}
          DATA_SOURCE_RETRY_BACKOFF: ${{ vars.DATA_SOURCE_RETRY_BACKOFF || '0.0' }}

        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"

          echo "=========================================="
          echo "🚀 国内基金每日分析系统"
          echo "=========================================="
          echo "⏰ 时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "🎯 运行模式: $MODE"
          echo "📊 自选基金: $FUND_LIST"
          echo ""
          echo "=========================================="
          echo "📋 配置检查"
          echo "=========================================="
          echo "【AI 配置】"
          echo "  Gemini API Key: $([ -n "$GEMINI_API_KEY" ] && echo '✅ 已配置' || echo '⚪ 未配置（将使用规则引擎）')"
          echo "  OpenAI API Key: $([ -n "$OPENAI_API_KEY" ] && echo '✅ 已配置' || echo '⚪ 未配置')"
          echo ""
          echo "【通知渠道】"
          echo "  Telegram: $([ -n "$TELEGRAM_BOT_TOKEN" ] && echo '✅ 已配置' || echo '⚪ 未配置')"
          echo "  邮件: $([ -n "$EMAIL_SENDER" ] && echo '✅ 已配置' || echo '⚪ 未配置')"
          echo "=========================================="
          echo ""

          # 根据模式执行
          if [ "$MODE" = "dry-run" ]; then
            python main.py --dry-run
          elif [ "$MODE" = "no-notify" ]; then
            python main.py --no-notify
          else
            python main.py
          fi

      - name: 上传分析报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fund-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30

      - name: 显示运行结果
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "📊 分析完成"
          echo "=========================================="
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            echo "生成的报告:"
            ls -la reports/
          else
            echo "⚠️ 未生成报告文件"
          fi
          echo ""
          LOG_FILE=$(ls logs/fund_analysis_*.log 2>/dev/null | tail -1)
          if [ -n "$LOG_FILE" ]; then
            echo "📜 最近日志（最后 30 行）:"
            tail -30 "$LOG_FILE"
          fi
